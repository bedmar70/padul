<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Disciplina Urbanística</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #333;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            color: #667eea;
            font-size: 36px;
            font-weight: bold;
        }

        .stat-card .subtitle {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .expedientes-list {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .expedientes-list h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .expediente-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .expediente-item:last-child {
            border-bottom: none;
        }

        .expediente-item .name {
            font-weight: bold;
            color: #333;
        }

        .expediente-item .days {
            color: #e74c3c;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.informado {
            background: #2ecc71;
            color: white;
        }

        .badge.no-informado {
            background: #e74c3c;
            color: white;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Dashboard Disciplina Urbanística</h1>
            <div class="controls">
                <button id="btnRestablecimiento">Cargar Restablecimiento</button>
                <button id="btnSancionadores">Cargar Sancionadores</button>
                <button id="btnAmbos">Cargar Ambos</button>
            </div>
        </header>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Cargando expedientes...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <!-- Estadísticas Generales -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Expedientes</h3>
                    <div class="number" id="totalExpedientes">0</div>
                </div>
                <div class="stat-card">
                    <h3>Informados</h3>
                    <div class="number" id="informados">0</div>
                    <div class="subtitle" id="informadosPercent">0%</div>
                </div>
                <div class="stat-card">
                    <h3>No Informados</h3>
                    <div class="number" id="noInformados">0</div>
                    <div class="subtitle" id="noInformadosPercent">0%</div>
                </div>
                <div class="stat-card">
                    <h3>Abiertos > 1 año</h3>
                    <div class="number" id="masUnAnio">0</div>
                </div>
            </div>

            <!-- Gráficos -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h2>Estado de Informes</h2>
                    <div class="chart-container">
                        <canvas id="chartInformados"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h2>Expedientes por Año</h2>
                    <div class="chart-container">
                        <canvas id="chartAnios"></canvas>
                    </div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h2>Estado de Expedientes</h2>
                    <div class="chart-container">
                        <canvas id="chartEstados"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h2>Tiempo de Apertura</h2>
                    <div class="chart-container">
                        <canvas id="chartTiempo"></canvas>
                    </div>
                </div>
            </div>

            <!-- Lista de Expedientes > 1 año -->
            <div class="expedientes-list">
                <h2>Expedientes Abiertos Hace Más de 1 Año</h2>
                <div id="listaExpedientes"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚙️ CONFIGURACIÓN - Solo URLs de webhooks (sin API keys)
        const CONFIG = {
            webhooks: {
                restablecimiento: 'https://n8n.escueladeefectividad.com/webhook/restablecimiento',
                sancionadores: 'https://n8n.escueladeefectividad.com/webhook/sancionadores'
            }
        };

        // Variables globales
        let charts = {};
        let expedientesData = [];

        // Elementos DOM
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const dashboard = document.getElementById('dashboard');

        // Event Listeners
        document.getElementById('btnRestablecimiento').addEventListener('click', () => cargarDatos('restablecimiento'));
        document.getElementById('btnSancionadores').addEventListener('click', () => cargarDatos('sancionadores'));
        document.getElementById('btnAmbos').addEventListener('click', () => cargarDatos('ambos'));

        // Función principal para cargar datos
        async function cargarDatos(tipo) {
            mostrarLoading(true);
            ocultarError();

            try {
                let datos = [];

                if (tipo === 'ambos') {
                    const [rest, sanc] = await Promise.all([
                        fetchWebhook('restablecimiento'),
                        fetchWebhook('sancionadores')
                    ]);
                    datos = [...rest, ...sanc];
                } else {
                    datos = await fetchWebhook(tipo);
                }

                // Filtrar solo tareas padre (expedientes)
                expedientesData = datos.filter(t => t.parent === null);

                if (expedientesData.length === 0) {
                    throw new Error('No se encontraron expedientes');
                }

                procesarYMostrarDatos();
            } catch (error) {
                mostrarError(error.message);
            } finally {
                mostrarLoading(false);
            }
        }

        // Fetch a webhook de n8n
        async function fetchWebhook(tipo) {
            const url = CONFIG.webhooks[tipo];
            
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`Error al cargar ${tipo}: ${response.status}`);
            }

            return await response.json();
        }

        // Procesar datos y actualizar dashboard
        function procesarYMostrarDatos() {
            const stats = calcularEstadisticas(expedientesData);
            actualizarEstadisticas(stats);
            actualizarGraficos(stats);
            actualizarListaExpedientes(stats.expedientesMayorUnAnio);
            dashboard.style.display = 'block';
        }

        // Calcular todas las estadísticas
        function calcularEstadisticas(expedientes) {
            const total = expedientes.length;
            const ahora = Date.now();
            const unAnioMs = 365 * 24 * 60 * 60 * 1000;

            // Informados vs No Informados
            const informados = expedientes.filter(e => {
                const cf = e.custom_fields.find(f => f.name === 'Informado');
                return cf && cf.value && cf.value.toUpperCase() === 'SI';
            }).length;
            const noInformados = total - informados;

            // Expedientes por año
            const porAnio = {};
            expedientes.forEach(e => {
                const match = e.name.match(/^(\d+)\/(\d{4})/);
                if (match) {
                    const anio = match[2];
                    porAnio[anio] = (porAnio[anio] || 0) + 1;
                }
            });

            // Estados
            const porEstado = {};
            expedientes.forEach(e => {
                const estado = e.status?.status || 'Sin estado';
                porEstado[estado] = (porEstado[estado] || 0) + 1;
            });

            // Expedientes abiertos > 1 año
            const expedientesMayorUnAnio = expedientes.filter(e => {
                const fechaCreacion = parseInt(e.date_created);
                const fechaCierre = e.date_closed ? parseInt(e.date_closed) : null;
                
                if (fechaCierre) return false; // Si está cerrado, no cuenta
                
                const diasAbierto = (ahora - fechaCreacion) / (24 * 60 * 60 * 1000);
                return diasAbierto > 365;
            }).map(e => {
                const fechaCreacion = parseInt(e.date_created);
                const diasAbierto = Math.floor((ahora - fechaCreacion) / (24 * 60 * 60 * 1000));
                return {
                    nombre: e.name,
                    dias: diasAbierto,
                    url: e.url
                };
            });

            // Distribución de tiempo de apertura
            const distribucionTiempo = {
                '0-3 meses': 0,
                '3-6 meses': 0,
                '6-12 meses': 0,
                '1-2 años': 0,
                '> 2 años': 0
            };

            expedientes.forEach(e => {
                const fechaCreacion = parseInt(e.date_created);
                const fechaCierre = e.date_closed ? parseInt(e.date_closed) : ahora;
                const diasTotal = (fechaCierre - fechaCreacion) / (24 * 60 * 60 * 1000);
                
                if (diasTotal < 90) distribucionTiempo['0-3 meses']++;
                else if (diasTotal < 180) distribucionTiempo['3-6 meses']++;
                else if (diasTotal < 365) distribucionTiempo['6-12 meses']++;
                else if (diasTotal < 730) distribucionTiempo['1-2 años']++;
                else distribucionTiempo['> 2 años']++;
            });

            return {
                total,
                informados,
                noInformados,
                porAnio,
                porEstado,
                expedientesMayorUnAnio,
                distribucionTiempo
            };
        }

        // Actualizar estadísticas en cards
        function actualizarEstadisticas(stats) {
            document.getElementById('totalExpedientes').textContent = stats.total;
            document.getElementById('informados').textContent = stats.informados;
            document.getElementById('noInformados').textContent = stats.noInformados;
            document.getElementById('masUnAnio').textContent = stats.expedientesMayorUnAnio.length;

            const pctInformados = stats.total > 0 ? ((stats.informados / stats.total) * 100).toFixed(1) : 0;
            const pctNoInformados = stats.total > 0 ? ((stats.noInformados / stats.total) * 100).toFixed(1) : 0;
            
            document.getElementById('informadosPercent').textContent = `${pctInformados}%`;
            document.getElementById('noInformadosPercent').textContent = `${pctNoInformados}%`;
        }

        // Actualizar gráficos
        function actualizarGraficos(stats) {
            // Destruir gráficos anteriores
            Object.values(charts).forEach(chart => chart.destroy());
            charts = {};

            // Gráfico Informados
            charts.informados = new Chart(document.getElementById('chartInformados'), {
                type: 'doughnut',
                data: {
                    labels: ['Informados', 'No Informados'],
                    datasets: [{
                        data: [stats.informados, stats.noInformados],
                        backgroundColor: ['#2ecc71', '#e74c3c'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Gráfico por Año
            const aniosOrdenados = Object.keys(stats.porAnio).sort();
            charts.anios = new Chart(document.getElementById('chartAnios'), {
                type: 'bar',
                data: {
                    labels: aniosOrdenados,
                    datasets: [{
                        label: 'Expedientes',
                        data: aniosOrdenados.map(a => stats.porAnio[a]),
                        backgroundColor: '#667eea',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });

            // Gráfico Estados
            charts.estados = new Chart(document.getElementById('chartEstados'), {
                type: 'pie',
                data: {
                    labels: Object.keys(stats.porEstado),
                    datasets: [{
                        data: Object.values(stats.porEstado),
                        backgroundColor: [
                            '#3498db',
                            '#e74c3c',
                            '#f39c12',
                            '#2ecc71',
                            '#9b59b6',
                            '#1abc9c'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Gráfico Tiempo
            charts.tiempo = new Chart(document.getElementById('chartTiempo'), {
                type: 'bar',
                data: {
                    labels: Object.keys(stats.distribucionTiempo),
                    datasets: [{
                        label: 'Expedientes',
                        data: Object.values(stats.distribucionTiempo),
                        backgroundColor: '#764ba2',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        // Actualizar lista de expedientes > 1 año
        function actualizarListaExpedientes(expedientes) {
            const lista = document.getElementById('listaExpedientes');
            
            if (expedientes.length === 0) {
                lista.innerHTML = '<p style="color: #999;">No hay expedientes abiertos con más de 1 año</p>';
                return;
            }

            lista.innerHTML = expedientes
                .sort((a, b) => b.dias - a.dias)
                .map(e => `
                    <div class="expediente-item">
                        <div>
                            <div class="name">${e.nombre}</div>
                            <a href="${e.url}" target="_blank" style="font-size: 12px; color: #667eea;">Ver en ClickUp →</a>
                        </div>
                        <div class="days">${e.dias} días</div>
                    </div>
                `).join('');
        }

        // Utilidades UI
        function mostrarLoading(mostrar) {
            loading.style.display = mostrar ? 'block' : 'none';
            // Deshabilitar botones durante carga
            document.querySelectorAll('button').forEach(btn => {
                btn.disabled = mostrar;
            });
        }

        function mostrarError(mensaje) {
            errorDiv.textContent = `❌ Error: ${mensaje}`;
            errorDiv.style.display = 'block';
            dashboard.style.display = 'none';
        }

        function ocultarError() {
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>
